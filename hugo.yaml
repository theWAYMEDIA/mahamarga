baseURL: 'https://mahamarga.org'
languageCode: 'hi'
defaultContentLanguage: 'hi'
title: 'MahaMarga | महामार्ग'

params:
  description: "महामार्गियों का घर — तितली-मार्ग की शिक्षा"
  schemaType: "EducationalOrganization"
  aiCrawlable: true

  # Development settings — disable all caching
  cache_control: "no-cache, no-store, must-revalidate"
  pragma: "no-cache"
  expires: "0"

# Development server settings
server:
  headers:
    - for: "/**"
      values:
        Cache-Control: "no-cache, no-store, must-revalidate"
        Pragma: "no-cache"
        Expires: "0"

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    style: github
    noClasses: false

outputs:
  home: ["HTML", "RSS", "JSON"]
  section: ["HTML", "RSS", "JSON"]
  page: ["HTML", "JSON"]

# Main site navigation
menu:
  main:
    - name: "🏠"
      url: "/"
      weight: 10
    - name: "दर्शन"
      url: "/darshan/"
      weight: 15
    - name: "साधना"
      url: "/sadhana/"
      weight: 20
    - name: "संगीत"
      url: "/sangeet/"
      weight: 22
    - name: "उपचार एवं ऊर्जा"
      url: "/upchar/"
      weight: 25
    - name: "प्रश्न-उत्तर"
      url: "/prashn-uttar/"
      weight: 30
    - name: "पुस्तकें"
      url: "/pustakein/"
      weight: 35
    - name: "For-AI"
      url: "/for-ai/"
      weight: 40
    - name: "ब्लॉग"
      url: "/blog/"
      weight: 45
    - name: "समुदाय"
      url: "https://wayist.life"
      weight: 50
      params:
        external: true
        target: "_blank"
        rel: "noopener noreferrer"

taxonomies:
  tag: 'tags'
  category: 'categories'
  keyword: 'keywords'
  concept: 'concepts'

related:
  threshold: 80
  includeNewer: true
  indices:
    - name: "keywords"
      weight: 100
    - name: "concepts"
      weight: 200

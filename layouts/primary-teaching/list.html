{{ define "main" }}
<section>
    {{ if not (strings.HasPrefix (strings.TrimSpace .Content) "<h1") }}<h1>{{ .Title }}</h1>{{ end }}
    {{ .Content }}

    <ul class="page-list">
    {{ range .Pages.ByWeight }}
    <li>
        <a href="{{ .Permalink }}">
            {{ with .Params.chapter_number }}<strong>{{ . }}</strong> — {{ end }}{{ .Title }}
        </a>
        {{ with .Params.subtitle }}<br><em>{{ . }}</em>{{ end }}
    </li>
    {{ end }}
    </ul>
</section>
{{ end }}
